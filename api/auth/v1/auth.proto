syntax = "proto3";

package auth.v1;

option go_package = "github.com/foxcool/psina/pkg/api/auth/v1;authv1";

service AuthService {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc Refresh(RefreshRequest) returns (RefreshResponse);
  rpc Logout(LogoutRequest) returns (LogoutResponse);
  rpc Verify(VerifyRequest) returns (VerifyResponse);

  // OAuth 2.0 / OpenID Connect sign-in. GetOAuthURL starts the flow: it
  // returns the provider's authorization URL plus a single-use CSRF state.
  // OAuthCallback completes it by exchanging the authorization code for
  // psina tokens, creating the user on first sign-in.
  rpc GetOAuthURL(GetOAuthURLRequest) returns (GetOAuthURLResponse);
  rpc OAuthCallback(OAuthCallbackRequest) returns (OAuthCallbackResponse);

  // Personal access tokens. The caller is identified by the Authorization
  // header; requests never carry a user_id. Only session (JWT) access tokens
  // are accepted here — a PAT cannot manage PATs.
  rpc CreatePersonalAccessToken(CreatePersonalAccessTokenRequest) returns (CreatePersonalAccessTokenResponse);
  rpc ListPersonalAccessTokens(ListPersonalAccessTokensRequest) returns (ListPersonalAccessTokensResponse);
  rpc RevokePersonalAccessToken(RevokePersonalAccessTokenRequest) returns (RevokePersonalAccessTokenResponse);
}

message RegisterRequest {
  string email = 1;
  string password = 2;
}

message RegisterResponse {
  string user_id = 1;
  string email = 2;
  string access_token = 3;
  string refresh_token = 4;
  int64 expires_in = 5;  // seconds
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  string access_token = 1;
  string refresh_token = 2;
  int64 expires_in = 3;  // seconds
}

message RefreshRequest {
  string refresh_token = 1;
}

message RefreshResponse {
  string access_token = 1;
  string refresh_token = 2;
  int64 expires_in = 3;
}

message LogoutRequest {
  string refresh_token = 1;
}

message LogoutResponse {
  bool success = 1;
}

message VerifyRequest {
  // Token from Authorization header, extracted by Connect interceptor
}

message VerifyResponse {
  string user_id = 1;
  string email = 2;
  // Opaque role strings from the user; psina never interprets them.
  repeated string roles = 3;
  // Headers for gateway: X-User-Id, X-User-Email, X-User-Roles
}

message GetOAuthURLRequest {
  string provider = 1;      // provider type, e.g. "google", "github"
  // Where the provider should send the user back to. Must be on the
  // provider's configured whitelist; the same value must be passed to
  // OAuthCallback.
  string redirect_uri = 2;
}

message GetOAuthURLResponse {
  string url = 1;           // provider authorization URL to redirect the user to
  // Single-use CSRF state embedded in the URL; expires server-side.
  string state = 2;
}

message OAuthCallbackRequest {
  string provider = 1;      // must match the GetOAuthURL provider
  string code = 2;          // authorization code from the provider redirect
  string state = 3;         // state from the provider redirect
  string redirect_uri = 4;  // same value that was passed to GetOAuthURL
}

message OAuthCallbackResponse {
  string user_id = 1;
  string email = 2;
  string access_token = 3;
  string refresh_token = 4;
  int64 expires_in = 5;     // seconds
  bool is_new_user = 6;     // true when this sign-in created the account
}

// PersonalAccessToken is the metadata view of a PAT. The secret is never
// returned here — only at creation time in CreatePersonalAccessTokenResponse.
message PersonalAccessToken {
  string name = 1;
  repeated string scopes = 2;
  int64 created_at = 3;            // unix seconds
  int64 expires_at = 4;           // unix seconds; 0 = never expires
  int64 last_used_at = 5;         // unix seconds; 0 = never used
  string id = 6;                  // UUID, used as the revoke handle
}

message CreatePersonalAccessTokenRequest {
  string name = 1;
  repeated string scopes = 2;
  int64 expires_at = 3;           // unix seconds; 0 = never expires
}

message CreatePersonalAccessTokenResponse {
  string token = 1;               // plaintext secret, shown exactly once
  PersonalAccessToken pat = 2;
}

message ListPersonalAccessTokensRequest {}

message ListPersonalAccessTokensResponse {
  repeated PersonalAccessToken pats = 1;
}

message RevokePersonalAccessTokenRequest {
  string id = 1;                  // UUID returned by Create/List
}

message RevokePersonalAccessTokenResponse {
  bool success = 1;
}
