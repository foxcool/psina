---
- name: Create app directory
  ansible.builtin.file:
    path: "{{ psina_app_dir }}"
    state: directory
    mode: "0750"

- name: Create secrets directory
  ansible.builtin.file:
    path: "{{ psina_app_dir }}/secrets"
    state: directory
    mode: "0700"

- name: Write JWT private key
  ansible.builtin.copy:
    content: "{{ psina_jwt_private_key }}"
    dest: "{{ psina_app_dir }}/secrets/jwt_private_key"
    mode: "0600"
  when: psina_jwt_private_key | length > 0
  no_log: true

- name: Write docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ psina_app_dir }}/docker-compose.yml"
    mode: "0640"

- name: Pull psina image
  community.docker.docker_compose_v2_pull:
    project_src: "{{ psina_app_dir }}"

- name: Start psina services
  community.docker.docker_compose_v2:
    project_src: "{{ psina_app_dir }}"
    state: present
