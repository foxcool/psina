# Complete Docker Compose example with Traefik + psina + backend
#
# Usage:
#   docker compose -f docker-compose-traefik.yaml up -d
#
# Test:
#   # Register
#   curl -X POST http://localhost/auth.v1.AuthService/Register \
#     -H "Content-Type: application/json" \
#     -d '{"email":"user@example.com","password":"securepass123"}'
#
#   # Login (save token)
#   TOKEN=$(curl -s -X POST http://localhost/auth.v1.AuthService/Login \
#     -H "Content-Type: application/json" \
#     -d '{"email":"user@example.com","password":"securepass123"}' | jq -r '.accessToken')
#
#   # Access protected API
#   curl http://localhost/api/hello -H "Authorization: Bearer $TOKEN"

volumes:
  postgres_data:

services:
  # Traefik reverse proxy
  # v3.0 is not enough: its docker provider negotiates Docker API 1.24, which
  # modern Docker daemons reject; v3.1+ fixes the negotiation.
  traefik:
    image: traefik:v3
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8081:8080"  # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  # psina authentication service
  psina:
    image: ghcr.io/foxcool/psina:latest
    # Or build locally:
    # build:
    #   context: ../..
    #   dockerfile: build/Dockerfile
    environment:
      PSINA_DB_URL: "postgres://psina:password@postgres:5432/psina?sslmode=disable"
      PSINA_SERVER_PORT: "8080"
      PSINA_LOGGER_LEVEL: "info"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    labels:
      # Expose auth endpoints without authentication. Connect RPC methods live
      # under /auth.v1., public keys under /.well-known/jwks.json.
      - "traefik.enable=true"
      - "traefik.http.routers.psina.rule=PathPrefix(`/auth.v1.`) || PathPrefix(`/.well-known`)"
      - "traefik.http.routers.psina.entrypoints=web"
      - "traefik.http.services.psina.loadbalancer.server.port=8080"
      # h2c (HTTP/2 cleartext) is required for gRPC clients; HTTP/JSON Connect
      # clients work over it as well.
      - "traefik.http.services.psina.loadbalancer.server.scheme=h2c"

  # PostgreSQL database
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: psina
      POSTGRES_PASSWORD: password
      POSTGRES_DB: psina
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # atlas_dev database is used by Atlas as a scratch space for schema diffing
      test: ["CMD-SHELL", "pg_isready -U psina -d psina && (psql -U psina -d atlas_dev -c 'SELECT 1' > /dev/null 2>&1 || psql -U psina -c 'CREATE DATABASE atlas_dev WITH OWNER psina')"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Applies the declarative schema before psina starts
  migrate:
    image: arigaio/atlas:latest
    volumes:
      - ../../schema.hcl:/schema.hcl:ro
    command: >
      schema apply
      --url "postgres://psina:password@postgres:5432/psina?sslmode=disable"
      --to "file:///schema.hcl"
      --dev-url "postgres://psina:password@postgres:5432/atlas_dev?sslmode=disable"
      --auto-approve
    depends_on:
      postgres:
        condition: service_healthy

  # Example backend service (protected by psina)
  backend:
    image: hashicorp/http-echo
    command: ["-text", "Hello from protected backend!"]
    labels:
      - "traefik.enable=true"
      # Protected route with ForwardAuth
      - "traefik.http.routers.backend.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.backend.entrypoints=web"
      - "traefik.http.routers.backend.middlewares=psina-auth"
      - "traefik.http.services.backend.loadbalancer.server.port=5678"
      # ForwardAuth middleware. /verify is the plain-HTTP endpoint made for
      # ForwardAuth; the Connect RPC Verify method would reject Traefik's bare GET.
      - "traefik.http.middlewares.psina-auth.forwardauth.address=http://psina:8080/verify"
      - "traefik.http.middlewares.psina-auth.forwardauth.authRequestHeaders=Authorization"
      - "traefik.http.middlewares.psina-auth.forwardauth.authResponseHeaders=X-User-Id,X-User-Email,X-User-Roles"
