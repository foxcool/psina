# Traefik ForwardAuth integration with psina
#
# This example shows how to configure Traefik to use psina
# for authenticating requests to your backend services.
#
# How it works:
# 1. Client sends request to Traefik with "Authorization: Bearer <token>"
# 2. Traefik forwards the request to psina's /verify endpoint
# 3. psina validates the token and returns:
#    - 200 OK with X-User-Id, X-User-Email and X-User-Roles headers (valid token)
#    - 401 Unauthorized (invalid/expired token)
# 4. Traefik forwards original request to backend with user headers
#
# Deploy this alongside your existing Traefik configuration.

# Dynamic configuration (traefik-dynamic.yaml)
http:
  # ForwardAuth middleware
  middlewares:
    psina-auth:
      forwardAuth:
        # Plain-HTTP verify endpoint made for ForwardAuth. Do not point this at
        # the Connect RPC Verify method (/auth.v1.AuthService/Verify): ForwardAuth
        # sends a bare GET without the POST + Content-Type that Connect requires.
        address: "http://psina:8080/verify"
        # Forward the Authorization header to psina
        authRequestHeaders:
          - "Authorization"
        # Copy these headers from psina response to backend request
        authResponseHeaders:
          - "X-User-Id"
          - "X-User-Email"
          - "X-User-Roles"

  routers:
    # Example: Protected API route
    api-protected:
      rule: "PathPrefix(`/api`)"
      service: "backend-api"
      middlewares:
        - "psina-auth"
      entryPoints:
        - "web"

    # Public auth routes (no middleware): Connect RPC methods live under
    # /auth.v1., and gateways fetch public keys from /.well-known/jwks.json.
    auth-public:
      rule: "PathPrefix(`/auth.v1.`) || PathPrefix(`/.well-known`)"
      service: "psina"
      entryPoints:
        - "web"

  # Services
  services:
    psina:
      loadBalancer:
        servers:
          # h2c (HTTP/2 cleartext) is required for gRPC clients; HTTP/JSON
          # Connect clients work over it as well.
          - url: "h2c://psina:8080"

    backend-api:
      loadBalancer:
        servers:
          - url: "http://your-backend:8080"

---
# Static configuration (traefik.yaml)
# entryPoints:
#   web:
#     address: ":80"
#
# providers:
#   file:
#     filename: /etc/traefik/traefik-dynamic.yaml

---
